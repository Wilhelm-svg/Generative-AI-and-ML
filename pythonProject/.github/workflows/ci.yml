name: CI — Test All Projects

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript Projects ──────────────────────────────────────────────────

  test-decision-system:
    name: AI Decision System
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: "ai-decision-system/package-lock.json" }
      - run: npm ci
        working-directory: ai-decision-system
      - run: npm test
        working-directory: ai-decision-system

  test-planning-agent:
    name: AI Planning Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: "ai-planning-agent/package-lock.json" }
      - run: npm ci
        working-directory: ai-planning-agent
      - run: npm test
        working-directory: ai-planning-agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

  test-automation-system:
    name: AI Automation System
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: "ai-automation-system/package-lock.json" }
      - run: npm ci
        working-directory: ai-automation-system
      - run: npm test
        working-directory: ai-automation-system
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  test-copilot:
    name: Enterprise AI Copilot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: "enterprise-ai-copilot/package-lock.json" }
      - run: npm ci
        working-directory: enterprise-ai-copilot
      - run: npm test
        working-directory: enterprise-ai-copilot

  # ── Python Project ───────────────────────────────────────────────────────

  test-multimodal:
    name: Multimodal Intelligence App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install fastapi uvicorn pytest hypothesis python-multipart
        working-directory: multimodal-intelligence-app
      - run: python3 -m pytest tests/ -v
        working-directory: multimodal-intelligence-app

  # ── Type checking ────────────────────────────────────────────────────────

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [ai-decision-system, ai-planning-agent, ai-automation-system, enterprise-ai-copilot]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci
        working-directory: ${{ matrix.project }}
      - run: npx tsc --noEmit
        working-directory: ${{ matrix.project }}

  # ── Docker build check ───────────────────────────────────────────────────

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [ai-decision-system, ai-planning-agent, ai-automation-system, enterprise-ai-copilot, multimodal-intelligence-app]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build --no-cache -t ${{ matrix.project }}:ci .
        working-directory: ${{ matrix.project }}
