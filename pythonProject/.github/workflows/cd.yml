name: CD — Deploy to Production

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy:
    name: Deploy All Services
    runs-on: ubuntu-latest
    needs: []  # Add CI job names here when ready
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all images
        run: |
          for project in ai-decision-system ai-planning-agent ai-automation-system enterprise-ai-copilot multimodal-intelligence-app; do
            echo "Building $project..."
            docker build -t ghcr.io/${{ github.repository }}/$project:${{ github.sha }} \
                         -t ghcr.io/${{ github.repository }}/$project:latest \
                         ./$project
            docker push ghcr.io/${{ github.repository }}/$project:${{ github.sha }}
            docker push ghcr.io/${{ github.repository }}/$project:latest
          done

      - name: Deploy with docker-compose
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          echo "GROQ_API_KEY=$GROQ_API_KEY" > .env
          echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env
          echo "TAVILY_API_KEY=$TAVILY_API_KEY" >> .env
          docker compose pull
          docker compose up -d --remove-orphans
          docker compose ps
